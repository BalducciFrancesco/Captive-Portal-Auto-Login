# ----------------------------
# README:
# duplicate this file as "config.conf"
# and fill in the values to configure the script
# ----------------------------

# Path to the file with username/password or other login data
credentials_file=credentials.txt

# Captive portal login URL
url=

# Fallback page used to trigger the captive portal when needed
fallback_trigger_url=http://neverssl.com

# Runs Chrome without a visible window
headless=true

# Full path to the Chrome binary
chrome_path=/usr/bin/google-chrome

# Full path to the ChromeDriver binary
chromedriver_path=/usr/bin/chromedriver

# Number of retry attempts for the login flow
retries=3

# Delay in seconds between retries
delay=5